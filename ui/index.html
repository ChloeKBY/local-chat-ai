<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI-Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
  /* ------------------------------------------------------ */
  /* ROOT + GLOBAL                                           */
  /* ------------------------------------------------------ */
  :root {
    /* Pastel Fantasy */
    --p1: #84C1FF;
    --p2: #ADD6FF;
    --p3: #D6EAFF;
    --p4: #EAF4FF;
    --p5: #F8FBFF;

    /* Blue Serenity */
    --blue1: #EDF2FB;
    --blue2: #E2EAFC;
    --blue3: #D7E3FC;
    --blue4: #CCDBFD;
    --blue5: #C1D3FE;
    --blue6: #B6CCFE;
    --blue7: #ABC4FF;

    --text-dark: #2a2a2a;
    --text-soft: #4a4a4a;

    --radius: 18px;
  
    --glass-light: rgba(255,255,255,0.25);
    --glass-medium: rgba(255,255,255,0.35);
  }

  body {
    margin: 0;
    font-family: "Plus Jakarta Sans", sans-serif;
    background: var(--blue1);
    color: #1a1a1a;
    overflow-x: hidden;
  }

  /* ------------------------------------------------------ */
  /* NAV BAR                                                 */
  /* ------------------------------------------------------ */
  nav {
    display: flex;
    background: var(--blue3);
    padding: 0 20px;
    border-bottom: 3px solid var(--blue6);
    position: relative;
    z-index: 9999;
  }

  nav a {
    padding: 14px 20px;
    color: #1a1a1a;
    text-decoration: none;
    font-weight: 600;
  }

  nav a.active {
    background: var(--blue5);
    border-radius: 8px;
  }

  nav a:hover {
    background: var(--blue4);
    border-radius: 8px;
  }

  /* ------------------------------------------------------ */
  /* TITLE HEADER                                           */
  /* ------------------------------------------------------ */
  .title-section {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
    background-image: url('images/Absolute Markiplier.jpg');
    background-size: cover;
    background-position: 70% 40%;
    height: 600px;
  }


  .big-title {
    font-size: 4.5rem;
    font-weight: 800;
    text-align: center;
    color: #D6EAFF;
    transition: transform 0.4s ease, opacity 0.4s ease;
  }

  .subtitle {
    margin-top: 10px;
    font-size: 1.2rem;
    color: #D6EAFF;
    opacity: 0.8;
    text-align: center;
  }


  /* ------------------------------------------------------ */
  /*  TRANSITION LAYER                            */
  /* ------------------------------------------------------ */
  .transition-layer {
    height: 200px;
    background: linear-gradient(180deg, var(--blue1), white);
    margin-top: 300px;
  }

  /* ------------------------------------------------------ */
  /* BOTTOM SHOWCASE                            */
  /* ------------------------------------------------------ */
  .bottom-showcase {
    padding: 80px 0;
    background: white;
  }

  /* Quick cards */
  .quick-section {
    max-width: 1300px;
    margin: 60px auto;
    padding: 0 30px;
    display: flex;
    gap: 30px;
    justify-content: center;
  }

  .quick-card {
    flex: 1;
    padding: 30px;
    border-radius: 22px;
    background: var(--glass-light);
    backdrop-filter: blur(8px);
    text-align: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    transition: transform 0.3s ease;
    text-decoration: none;
    color: #1a1a1a;
    font-weight: 600;
    display: block;
  }


  .quick-card:hover {
    transform: translateY(-6px);
  }

  /* Featured section */
  .featured-section {
    max-width: 1300px;
    margin: 80px auto;
    padding: 0 30px;
    display: flex;
    align-items: center;
    gap: 40px;
  }

  .featured-img {
    width: 45%;
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  }

  .featured-img img {
    width: 100%;
    display: block;
  }

  .featured-info {
    flex: 1;
    background: var(--glass-medium);
    padding: 30px;
    border-radius: 22px;
    backdrop-filter: blur(10px);
  }

  /* Gallery strip */
  .gallery-strip {
    margin: 80px 0;
    padding: 20px 0;
    overflow-x: auto;
    white-space: nowrap;
  }

  .gallery-strip img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 22px;
    margin: 0 12px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    transition: transform 0.3s ease;
  }

  .gallery-strip img:hover {
    transform: scale(1.08);
  }

  /* Recent section */
  .recent-section {
    max-width: 1300px;
    margin: 60px auto;
    padding: 0 30px;
  }

  .recent-item {
    background: var(--glass-light);
    padding: 18px;
    border-radius: 18px;
    margin-bottom: 14px;
    backdrop-filter: blur(6px);
  }

  /* Footer */
  footer {
    margin-top: 80px;
    padding: 40px;
    text-align: center;
    background: var(--blue3);
    border-top: 3px solid var(--blue6);
  }
  </style>
</head>

<body>

    </section>

  </section>
